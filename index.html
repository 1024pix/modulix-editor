<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Modulix Editor</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.9.0/css/all.min.css"
      integrity="sha512-q3eWabyZPc1XTCmF+8/LuE1ozpg5xxn7iO89yfSOd5/oKvyqLngoNGsx8jq92Y8eXJ/IRxQbEC+FGSYxtk2oiw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/jodit@4.2.27/es2015/jodit.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
  </head>
  <body>
    <header class="modulix-editor__header">
      <h1 class="modulix-editor__title">
        <img
          src="logo.png"
          alt=""
          width="512"
          height="512"
          class="modulix-editor__logo"
          loading="lazy"
        />
        Modulix Editor
      </h1>

      <div class="btn-group">
        <button
          class="btn btn-light"
          id="preview-button"
          aria-label="Prévisualiser"
        >
          <span class="fa fa-eye me-1"></span> Prévisualiser
        </button>
        <button
          class="btn btn-light"
          id="toggle-json-button"
          aria-label="Afficher le JSON"
        >
          <span class="fa fa-code me-1"></span> JSON
        </button>
        <button
          class="btn btn-light"
          id="download-json-button"
          aria-label="Télécharger le JSON"
        >
          <span class="fa fa-download me-1"></span> Télécharger
        </button>
        <button
          class="btn btn-light"
          id="format-button"
          aria-label="Nettoyer la typographie"
        >
          <span class="fa fa-broom me-1"></span> Nettoyer
        </button>
        <button
          class="btn btn-light"
          id="collapse-all-button"
          aria-label="Tout replier"
        >
          <span class="fa fa-compress me-1"></span> Replier
        </button>
        <button
          class="btn btn-light"
          id="display-documentation-button"
          aria-label="Afficher la fiche mémo"
          data-tooltip="Afficher la fiche mémo"
        >
          <span class="fa fa-book"></span>
        </button>
      </div>

      <button
        class="btn modulix-editor__reset-button"
        id="reset-button"
        aria-label="Réinitialiser le module"
      >
        <span class="fa fa-trash me-1"></span> Réinitialiser
      </button>
    </header>

    <main class="modulix-editor">
      <div class="modulix-editor__editor">
        <div id="editor_holder"></div>
      </div>

      <div class="modulix-editor__render" id="json-output-pane">
        <textarea
          id="json_output"
          class="modulix-editor-render__input"
        ></textarea>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@json-editor/json-editor@2.15.2/dist/jsoneditor.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jodit@4.2.27/es2018/jodit.fat.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="index.js"></script>
  </body>
</html>
